- name: Deploy Laravel app
  hosts: laravel_server
  become: true

  vars:
    app_path: /var/www/thy-pharoth
    repo_url: https://github.com/pharoth9999/tp03-2026.git
    repo_branch: main

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - php8.1
          - php8.1-cli
          - php8.1-fpm
          - php8.1-mbstring
          - php8.1-xml
          - php8.1-curl
          - php8.1-sqlite3
          - composer
          - npm
        state: present

    - name: Ensure deployment directory exists
      file:
        path: "{{ app_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Clone/update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_path }}"
        version: "{{ repo_branch }}"
        force: true
        accept_hostkey: yes

    - name: Ensure .env exists
      copy:
        src: "{{ app_path }}/.env.example"
        dest: "{{ app_path }}/.env"
        remote_src: true
        force: false
        owner: www-data
        group: www-data

    - name: Set permissions before installation
      file:
        path: "{{ app_path }}"
        state: directory
        recurse: yes
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Install PHP dependencies
      command: composer install --no-dev --optimize-autoloader --no-interaction
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Generate Laravel app key
      command: php artisan key:generate --force
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Install Node dependencies
      command: npm install
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Build frontend
      command: npm run build
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Optimize Laravel
      command: php artisan optimize
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Set final permissions
      file:
        path: "{{ app_path }}"
        state: directory
        recurse: yes
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Restart PHP-FPM
      service:
        name: php8.1-fpm
        state: restarted

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted