- name: Deploy Laravel app
  hosts: laravel_server
  become: true

  vars:
    app_path: /var/www/thy-pharoth
    repo_url: https://github.com/pharoth9999/tp03-2026.git
    repo_branch: main

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Fix broken packages
      shell: apt-get install -f -y
      register: fix_result
      failed_when: fix_result.rc not in [0, 100]

    - name: Install required packages
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - php8.1
          - php8.1-cli
          - php8.1-fpm
          - php8.1-mbstring
          - php8.1-xml
          - php8.1-curl
          - php8.1-sqlite3
          - composer
        state: present

    - name: Remove deployment directory if it exists (fresh clone)
      file:
        path: "{{ app_path }}"
        state: absent

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_path }}"
        version: "{{ repo_branch }}"
        accept_hostkey: yes

    - name: Set directory ownership to www-data
      file:
        path: "{{ app_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
        recurse: yes

    - name: Ensure .env exists
      copy:
        src: "{{ app_path }}/.env.example"
        dest: "{{ app_path }}/.env"
        remote_src: true
        force: false
        owner: www-data
        group: www-data

    - name: Set permissions before installation
      file:
        path: "{{ app_path }}"
        state: directory
        recurse: yes
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Install PHP dependencies
      command: composer install --no-dev --optimize-autoloader --no-interaction
      args:
        chdir: "{{ app_path }}"
      become_user: www-data
      environment:
        HOME: "{{ app_path }}"
        COMPOSER_HOME: "{{ app_path }}/.composer"
        COMPOSER_CACHE_DIR: "{{ app_path }}/.composer/cache"

    - name: Generate Laravel app key
      command: php artisan key:generate --force
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Install NodeSource repository
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      ignore_errors: yes

    - name: Install Node.js and npm
      apt:
        name:
          - nodejs
        state: present
      ignore_errors: yes

    - name: Ensure npm cache directory exists
      file:
        path: "{{ app_path }}/.npm"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Install Node dependencies (optional)
      command: npm install
      args:
        chdir: "{{ app_path }}"
      become_user: www-data
      environment:
        HOME: "{{ app_path }}"
        npm_config_cache: "{{ app_path }}/.npm"
      ignore_errors: yes

    - name: Build frontend (optional)
      command: npm run build
      args:
        chdir: "{{ app_path }}"
      become_user: www-data
      environment:
        HOME: "{{ app_path }}"
        npm_config_cache: "{{ app_path }}/.npm"
      ignore_errors: yes

    - name: Optimize Laravel
      command: php artisan optimize
      args:
        chdir: "{{ app_path }}"
      become_user: www-data

    - name: Set final permissions
      file:
        path: "{{ app_path }}"
        state: directory
        recurse: yes
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Configure nginx for /thy-pharoth Laravel route
      copy:
        dest: /etc/nginx/conf.d/thy-pharoth.conf
        content: |
          server {
            listen 80;
            server_name 178.128.93.188;

            location = /thy-pharoth {
              return 301 /thy-pharoth/;
            }

            location /thy-pharoth/ {
              alias {{ app_path }}/public/;
              index index.php index.html;
              try_files $uri $uri/ /thy-pharoth/index.php?$query_string;
            }

            location ~ ^/thy-pharoth/(.+\.php)$ {
              alias {{ app_path }}/public/$1;
              include snippets/fastcgi-php.conf;
              fastcgi_pass unix:/run/php/php8.1-fpm.sock;
              fastcgi_param SCRIPT_FILENAME {{ app_path }}/public/$1;
              include fastcgi_params;
            }
          }

    - name: Validate nginx config
      command: nginx -t

    - name: Restart PHP-FPM
      service:
        name: php8.1-fpm
        state: restarted

    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
